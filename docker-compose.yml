services:
  db:
    image: mysql:8.0
    container_name: check_itw_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: check_itw
      MYSQL_USER: symfony
      MYSQL_PASSWORD: symfony_password
    ports:
      - "3306:3306"
    volumes:
      - check_itw_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  php:
    image: php:8.1-cli
    container_name: check_itw_php
    working_dir: /app
    volumes:
      - .:/app
      - /app/vendor
    environment:
      DATABASE_URL: mysql://symfony:symfony_password@db:3306/check_itw
      APP_ENV: dev
      APP_SECRET: scretf0rt3st
      SYMFONY_ENDPOINTS: https://api.github.com/repos/symfony/recipes/contents/index.json?ref=flex/main
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      apt-get update && apt-get install -y libxml2-dev git unzip zip &&
      git config --global --add safe.directory /app &&
      docker-php-ext-install pdo pdo_mysql xml dom &&
      curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer &&
      composer install --no-interaction &&
      php bin/console doctrine:database:create --if-not-exists &&
      php bin/console doctrine:migrations:migrate --no-interaction &&
      php bin/console server:run 0.0.0.0:8000
      "
    ports:
      - "8000:8000"

volumes:
  check_itw_db_data:
